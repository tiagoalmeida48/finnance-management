<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="bgGlow" cx="0.5" cy="0.0" r="1">
      <stop offset="0" stop-color="#242B3D"/>
      <stop offset="1" stop-color="#090B12"/>
    </radialGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="100" y2="100">
      <stop stop-color="#F5DB88"/>
      <stop offset="0.5" stop-color="#D3A32A"/>
      <stop offset="1" stop-color="#806216"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="100">
      <stop stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.01"/>
    </linearGradient>

    <linearGradient id="trendArea" x1="0" y1="0" x2="0" y2="100">
      <stop stop-color="#D3A32A" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#D3A32A" stop-opacity="0.0"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="100" height="100" rx="24" fill="url(#bgGlow)"/>
  <rect x="0.5" y="0.5" width="99" height="99" rx="23.5" stroke="#FFFFFF" stroke-opacity="0.05"/>

  <g filter="url(#glow)">
    <!-- Barras de Gráfico Subindo -->
    <rect x="23" y="58" width="14" height="24" rx="4" fill="url(#glass)"/>
    <rect x="43" y="44" width="14" height="38" rx="4" fill="url(#glass)"/>
    <rect x="63" y="24" width="14" height="58" rx="4" fill="url(#gold)"/>

    <!-- Área de Tendência Ascendente por trás da linha -->
    <path d="M 12 70 L 30 58 L 50 48 L 70 28 L 70 82 L 12 82 Z" fill="url(#trendArea)"/>

    <!-- Linha de Tendência Ascendente Dinâmica -->
    <path d="M 12 70 L 30 58 L 50 48 L 70 28" fill="none" stroke="#F5DB88" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Data points na linha de tendência -->
    <circle cx="30" cy="58" r="3.5" fill="#090B12" stroke="#F5DB88" stroke-width="2"/>
    <circle cx="50" cy="48" r="3.5" fill="#090B12" stroke="#F5DB88" stroke-width="2"/>

    <!-- Ponto final de "ALTA" no gráfico (Gold Edge) -->
    <circle cx="70" cy="28" r="4.5" fill="#F5DB88"/>
    <circle cx="70" cy="28" r="1.5" fill="#090B12"/>
  </g>
</svg>
