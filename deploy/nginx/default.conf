server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    etag on;
    if_modified_since exact;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/ttf
        font/otf
        image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires -1;
    }

    location ~* ^/assets/.*\.(js|mjs|css|map|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
    }
}
