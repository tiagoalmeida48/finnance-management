http:
  middlewares:
    finnance-compress:
      compress: {}

    finnance-security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true

    finnance-chain:
      chain:
        middlewares:
          - finnance-compress
          - finnance-security-headers
